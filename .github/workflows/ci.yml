name: tryna Brain CI

# main/develop으로 향하는 PR에서 Actions 체크로 실행되고,
# deploy.yml에서는 workflow_call로 재사용되어 "배포 전 CI 게이트" 역할도 겸한다.
on:
  pull_request:
    branches: [ "main", "develop" ]
  push:
    branches: [ "develop" ]
  workflow_call:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    # 실제 배포 환경도 AuraDB(Neo4j)이므로, Neo4j 컨테이너로 기동 검증까지 수행한다.
    services:
      neo4j:
        image: neo4j:5-community
        env:
          NEO4J_AUTH: neo4j/password
        ports:
          - 7687:7687
          - 7474:7474
        options: >-
          --health-cmd "cypher-shell -u neo4j -p password 'RETURN 1'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Build Docker image
        run: docker build -t tryna-brain:ci .

      # Neo4j 컨테이너로 애플리케이션을 기동해 연결을 /api/v1/health로 검증한다.
      - name: Boot application against Neo4j and verify /api/v1/health
        env:
          NEO4J_URI: neo4j://localhost:7687
          NEO4J_USERNAME: neo4j
          NEO4J_PASSWORD: password
          NEO4J_DATABASE: neo4j
          APP_ENV: local
          UPSTAGE_API_KEY: ci-dummy-upstage-api-key
          INTERNAL_API_KEY: ci-dummy-internal-api-key
        run: |
          set -euo pipefail
          LOG=/tmp/tryna-brain-boot.log
          : > "$LOG"

          uvicorn app.main:app --host 127.0.0.1 --port 8000 >>"$LOG" 2>&1 &
          PID=$!
          trap 'kill "$PID" 2>/dev/null || true; wait "$PID" 2>/dev/null || true' EXIT

          code=""
          for i in $(seq 1 60); do
            if ! kill -0 "$PID" 2>/dev/null; then
              echo "애플리케이션이 기동 중 종료되었습니다 (시도 $i)"
              break
            fi
            code="$(curl -sS -o /dev/null -w '%{http_code}' http://127.0.0.1:8000/api/v1/health || true)"
            if [ "$code" = "200" ]; then
              echo "헬스체크 성공 (Neo4j 연결 정상)"
              exit 0
            fi
            sleep 2
          done

          echo "헬스체크 실패 (마지막 HTTP 코드=${code:-n/a})"
          echo "----- 애플리케이션 로그 (마지막 250줄) -----"
          tail -n 250 "$LOG" || true
          exit 1
